name: Deploy

on:
  push:
    branches:
      - main
      - dev

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    name: Deploy (${{ github.ref_name }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set environment config
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "IMAGE_TAG=latest"          >> $GITHUB_ENV
            echo "CONTAINER=am-collision-prod" >> $GITHUB_ENV
            echo "HOST_PORT=3000"            >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=dev"             >> $GITHUB_ENV
            echo "CONTAINER=am-collision-dev"  >> $GITHUB_ENV
            echo "HOST_PORT=3001"            >> $GITHUB_ENV
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint + TypeScript)
        run: npm run lint

      - name: Create .env file
        run: echo "${{ secrets.ENV }}" > .env.local

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase image name
        run: echo "IMAGE=${{ env.REGISTRY }}/${IMAGE_NAME,,}:${{ env.IMAGE_TAG }}" >> $GITHUB_ENV
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}
          cache-from: type=registry,ref=${{ env.IMAGE }}
          cache-to: type=inline

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy on Hetzner
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << EOF
            docker login ${{ env.REGISTRY }} -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
            docker pull ${{ env.IMAGE }}
            docker stop ${{ env.CONTAINER }} 2>/dev/null || true
            docker rm   ${{ env.CONTAINER }} 2>/dev/null || true
            docker run -d \
              --name ${{ env.CONTAINER }} \
              --restart unless-stopped \
              -p ${{ env.HOST_PORT }}:80 \
              ${{ env.IMAGE }}
            docker image prune -f
          EOF
